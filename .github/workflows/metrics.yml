name: Generate Metrics

on:
  schedule:
    - cron: "0 3 * * *" # daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Stats + languages + isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: DoctorGuidance
          filename: assets/metrics.svg
          committer_branch: main
          output_action: commit
          committer_message: "chore: update metrics [skip ci]"
          config_timezone: Asia/Tehran
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: "#00e5a0, #00b4d8, #b388ff, #ff5d8f, #ffd166, #06d6a0, #118ab2, #ef476f"
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_display: large

<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040b14"/>
      <stop offset="0.5" stop-color="#081527"/>
      <stop offset="1" stop-color="#03101c"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00e5a0">
        <animate attributeName="stop-color" values="#00e5a0;#00b4d8;#ff5d8f;#00e5a0" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#00b4d8">
        <animate attributeName="stop-color" values="#00b4d8;#ff5d8f;#00e5a0;#00b4d8" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#ff5d8f">
        <animate attributeName="stop-color" values="#ff5d8f;#00e5a0;#00b4d8;#ff5d8f" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#0d2438" stroke-width="1" fill="none"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="ecgPath" d="M-260 238 h60 l10 -8 l10 8 h25 l5 8 l7 -70 l7 85 l5 -23 h30 l12 -12 l12 12 h77
      h60 l10 -8 l10 8 h25 l5 8 l7 -70 l7 85 l5 -23 h30 l12 -12 l12 12 h77
      h60 l10 -8 l10 8 h25 l5 8 l7 -70 l7 85 l5 -23 h30 l12 -12 l12 12 h77
      h60 l10 -8 l10 8 h25 l5 8 l7 -70 l7 85 l5 -23 h30 l12 -12 l12 12 h77
      h60 l10 -8 l10 8 h25 l5 8 l7 -70 l7 85 l5 -23 h30 l12 -12 l12 12 h77"/>
  </defs>

  <!-- background -->
  <rect width="900" height="300" rx="18" fill="url(#bg)"/>
  <rect width="900" height="300" rx="18" fill="url(#grid)" opacity="0.55"/>
  <rect x="1" y="1" width="898" height="298" rx="17" stroke="#123049" stroke-width="2" fill="none"/>

  <!-- corner HUD brackets -->
  <path d="M28 46 v-18 h18 M872 46 v-18 h-18 M28 254 v18 h18 M872 254 v18 h-18" stroke="#00e5a0" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- top-left vitals: pulsing heart + HR -->
  <g transform="translate(58,44)">
    <path d="M0 3 C0 -2 8 -2 8 3 C8 8 0 11 0 14 C0 11 -8 8 -8 3 C-8 -2 0 -2 0 3 Z" fill="#ff5d8f" transform="scale(1)" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="scale" values="1;1.35;1;1;1" keyTimes="0;0.15;0.3;0.5;1" dur="0.85s" repeatCount="indefinite" additive="sum"/>
    </path>
    <text x="20" y="10" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#ff5d8f">HR 72</text>
  </g>

  <!-- top-right vitals -->
  <text x="842" y="54" text-anchor="end" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#00b4d8">SpO2 99%
    <animate attributeName="opacity" values="1;1;0.35;1" keyTimes="0;0.8;0.9;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- name -->
  <text x="450" y="118" text-anchor="middle" font-family="'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif" font-size="54" font-weight="800" letter-spacing="7" fill="url(#titleGrad)" filter="url(#softGlow)">ERSHAD ZOLFI</text>

  <!-- handle -->
  <text x="450" y="152" text-anchor="middle" font-family="'Courier New',monospace" font-size="19" fill="#5b7a93">&lt; <tspan fill="#00e5a0" font-weight="bold">DoctorGuidance</tspan> /&gt;</text>

  <!-- tagline -->
  <text x="450" y="188" text-anchor="middle" font-family="'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif" font-size="16" font-weight="600" letter-spacing="5" fill="#8fb3cc">MEDICINE <tspan fill="#00e5a0">×</tspan> CODE <tspan fill="#00b4d8">×</tspan> ART<tspan fill="#00e5a0" font-family="'Courier New',monospace">▍<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>

  <!-- ECG: dim base trace -->
  <use href="#ecgPath" stroke="#123a52" stroke-width="2" fill="none"/>
  <!-- ECG: bright moving pulse -->
  <use href="#ecgPath" stroke="#00e5a0" stroke-width="2.5" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-dasharray="150 1750">
    <animate attributeName="stroke-dashoffset" values="1900;0" dur="4.5s" repeatCount="indefinite"/>
  </use>
  <!-- glow dot following the trace -->
  <circle r="4" fill="#b6ffe6" filter="url(#glow)">
    <animateMotion dur="4.5s" repeatCount="indefinite" rotate="0">
      <mpath href="#ecgPath"/>
    </animateMotion>
  </circle>

  <!-- bottom status line -->
  <text x="58" y="278" font-family="'Courier New',monospace" font-size="13" fill="#3d5a73">STATUS: <tspan fill="#00e5a0">BUILDING THE FUTURE OF MEDICINE</tspan></text>
  <text x="842" y="278" text-anchor="end" font-family="'Courier New',monospace" font-size="13" fill="#3d5a73">UPTIME: ∞</text>

  <!-- floating medical crosses -->
  <g fill="#00e5a0" opacity="0.25">
    <path d="M120 200 h6 v6 h6 v6 h-6 v6 h-6 v-6 h-6 v-6 h6 Z">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M770 90 h5 v5 h5 v5 h-5 v5 h-5 v-5 h-5 v-5 h5 Z">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>
  <g font-family="'Courier New',monospace" font-size="14" fill="#00b4d8" opacity="0.3">
    <text x="160" y="80">{ }
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="720" y="200">&lt;/&gt;
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>

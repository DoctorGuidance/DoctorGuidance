<svg width="700" height="44" viewBox="0 0 700 44" xmlns="http://www.w3.org/2000/svg">
  <style>
    .r { font-family:'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif; font-size:21px; font-weight:600; letter-spacing:2px; fill:#00b48a; opacity:0; animation: cyc 18s linear infinite; }
    .rf { opacity:1; }
    .r1 { animation-delay:3s; } .r2 { animation-delay:6s; } .r3 { animation-delay:9s; }
    .r4 { animation-delay:12s; } .r5 { animation-delay:15s; }
    @keyframes cyc { 0% {opacity:0;} 2.5% {opacity:1;} 14% {opacity:1;} 16.6% {opacity:0;} 100% {opacity:0;} }
    .cur { fill:#00e5a0; animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% {opacity:0;} }
  </style>
  <g text-anchor="middle">
    <text x="350" y="29" class="r rf">🩺 MEDICAL STUDENT</text>
    <text x="350" y="29" class="r r1">🤖 TELEGRAM BOT DEVELOPER</text>
    <text x="350" y="29" class="r r2">🧠 AI ENTHUSIAST</text>
    <text x="350" y="29" class="r r3">🎨 DESIGNER &amp; CREATOR</text>
    <text x="350" y="29" class="r r4">💡 ENTREPRENEUR</text>
    <text x="350" y="29" class="r r5">🌌 COSMOS ADMIRER</text>
  </g>
  <text x="660" y="29" class="cur" font-family="'Courier New',monospace" font-size="22">▍</text>
</svg>
